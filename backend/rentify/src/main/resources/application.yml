spring:
  application:
    name: rentify
  datasource:
    url: ${DATABASE}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      schema: rentify
      maximum-pool-size: ${DB_POOL_MAX_SIZE:2}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      pool-name: ${spring.application.name}-pool
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: rentify
  flyway:
    schemas: rentify
    default-schema: rentify
    create-schemas: true
    locations: classpath:db/migration/${DATABASE_TYPE:mysql}


  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.authentication: DEBUG
    org.springframework.security.web.access: DEBUG

jwt:
  time:
    expiration: ${JWT_EXPIRATION:86400000} # 1 dia en milisegundos
  secret:
    key: ${JWT_SECRETKEY:OuqtXAJaOLVlcEmXSn6h5v2zL+FZgHSVl2ZjjXOXAqY=}

token:
  time:
    expiration: ${TOKEN_PURPOSE:3600000} # 1 hora en milisegundos

resend:
  apiKey: ${RESEND_APIKEY}
  email: ${RESEND_EMAIL}
  name: ${RESEND_NAME:Rentify}

api:
  base: api/v1

frontend:
  baseUrl: ${FRONT_BASE_URL:http://localhost:3000}
  verifyEmailUrl: ${VERIFYEMAIL_URL:/auth/verify-email}
  resetPasswordUrl: ${RESETPASSWORD_URL:/auth/reset-password}

web:
  cors:
    allowed-origins: ${CORS_ALLOWED}
